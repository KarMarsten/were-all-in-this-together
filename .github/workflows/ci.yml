name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs on the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep CI's Flutter version in lockstep with the dev SDK pinned in .fvmrc,
      # so "works on CI" really means "works with the pinned toolchain."
      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Fetch dependencies
        run: flutter pub get

      # --fatal-infos promotes `info`-level analyzer results to failures, so we
      # can't accidentally let lint noise accumulate.
      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Test
        run: flutter test

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high

  dependency-vulnerabilities:
    name: Dependency vulnerabilities (OSV)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OSV Scanner reads lockfiles (including pubspec.lock) and checks them
      # against the public Open Source Vulnerabilities database. This covers
      # pub.dev packages, where Snyk's open-source scanner is not useful.
      - name: Scan lockfiles with OSV
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.4
        with:
          scan-args: |-
            --lockfile=pubspec.lock

  secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Official Gitleaks action. Personal repositories only need the built-in
      # GITHUB_TOKEN; organization repos may also require GITLEAKS_LICENSE.
      - name: Scan repository for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Snyk Code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Required so the workflow can upload SARIF results into GitHub Code
    # Scanning (visible under the "Security" tab and inline in PRs).
    permissions:
      contents: read
      security-events: write
      actions: read

    # Skip on PRs opened from forks — they can't read repository secrets, so
    # the Snyk CLI would fail to authenticate. Forks still run the analyze
    # & test job above; maintainers get the security signal on push to main
    # and on PRs from branches in this repo.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs the Snyk CLI onto $PATH. Pinned to the setup action's
      # master ref — that's the pattern Snyk publishes in its docs; we
      # trade sub-version stability for timely detection-rule updates.
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      # Snyk Code = static analysis (SAST). It supports Dart, so this
      # catches code-level issues across lib/ and test/.
      #
      # We deliberately don't run `snyk test` (Open Source / dependency
      # scanning) — Snyk does not support pub.dev packages, so running it
      # on a Flutter pubspec would produce a misleading "no issues" result.
      # Pub.dev dependency CVEs are handled separately by the OSV job above.
      #
      # --severity-threshold=high means we fail the job on High and
      # Critical findings only. Mediums and lows still appear in the SARIF
      # upload but don't block merges while the rule baseline settles.
      #
      # If SNYK_TOKEN is not configured in repo secrets yet, we emit a
      # GitHub Actions warning and exit cleanly instead of failing — this
      # lets the workflow plumbing merge before the secret is in place,
      # and the warning keeps the gap visible until it's fixed.
      - name: Snyk Code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "::warning title=Snyk skipped::SNYK_TOKEN is not set; skipping Snyk Code scan. Add a SNYK_TOKEN repository secret (https://app.snyk.io/account) to enable SAST."
            exit 0
          fi
          snyk code test \
            --severity-threshold=high \
            --sarif-file-output=snyk-code.sarif

      # Upload only when the SARIF file was produced (i.e. the scan
      # actually ran). Runs even on failure so high-severity findings
      # still surface in the Security tab and inline on the PR.
      - name: Upload Snyk Code results to GitHub Code Scanning
        if: ${{ always() && hashFiles('snyk-code.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
